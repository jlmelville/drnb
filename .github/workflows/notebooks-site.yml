name: Notebook site

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - notebooks/_quarto.yml
      - notebooks/index.qmd
      - notebooks/articles/**
      - docs/notebook-site.md
      - .github/workflows/notebooks-site.yml

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build notebook site
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2

      - name: Check article sidebar
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          articles = {path.name for path in Path("notebooks/articles").glob("*.ipynb")}
          config = Path("notebooks/_quarto.yml").read_text(encoding="utf-8")
          hrefs = set(re.findall(r"href: articles/([^\n]+\.ipynb)", config))

          missing = sorted(articles - hrefs)
          stale = sorted(hrefs - articles)
          if missing or stale:
              if missing:
                  print("Missing sidebar entries:", ", ".join(missing))
              if stale:
                  print("Stale sidebar entries:", ", ".join(stale))
              raise SystemExit(1)

          print(f"Article sidebar is in sync ({len(articles)} notebooks).")
          PY

      - name: Render notebook site
        run: quarto render notebooks

      - name: Optimize rendered images
        run: uv run --with pillow==11.1.0 --no-project python scripts/optimize_site_images.py notebooks/_site --max-edge 3200

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: notebooks/_site

  deploy:
    name: Deploy notebook site
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
