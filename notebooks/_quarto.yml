project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - "articles/*.ipynb"

website:
  title: "drnb notebooks"
  site-url: "https://jlmelville.github.io/drnb/"
  repo-url: "https://github.com/jlmelville/drnb"
  navbar:
    left:
      - href: index.qmd
        text: Notebooks
      - href: https://github.com/jlmelville/drnb
        text: GitHub
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - section: "Articles"
        contents:
          - text: do-hubs-hurt
            href: articles/do-hubs-hurt.ipynb
          - text: embed-distances
            href: articles/embed-distances.ipynb
          - text: hubness
            href: articles/hubness.ipynb
          - text: htumap
            href: articles/htumap.ipynb
          - text: leopold
            href: articles/leopold.ipynb
          - text: mediabias
            href: articles/mediabias.ipynb
          - text: ncd-newsgroups
            href: articles/ncd-newsgroups.ipynb
          - text: pacmap-local-scaling
            href: articles/pacmap-local-scaling.ipynb
          - text: pacmap-repeats
            href: articles/pacmap-repeats.ipynb
          - text: pca-nn-overlap
            href: articles/pca-nn-overlap.ipynb
          - text: recall
            href: articles/recall.ipynb
          - text: sikmmds
            href: articles/sikmmds.ipynb
          - text: smmds
            href: articles/smmds.ipynb
          - text: tfidf-renorm-prep
            href: articles/tfidf-renorm-prep.ipynb
          - text: tfidf-renorm
            href: articles/tfidf-renorm.ipynb
          - text: tsne-repeats
            href: articles/tsne-repeats.ipynb
          - text: umap-annealed-neighbors-01
            href: articles/umap-annealed-neighbors-01.ipynb
          - text: umap-annealed-neighbors-02-tumap
            href: articles/umap-annealed-neighbors-02-tumap.ipynb
          - text: umap-annealed-neighbors-03-pca
            href: articles/umap-annealed-neighbors-03-pca.ipynb
          - text: umap-tsne-exp
            href: articles/umap-tsne-exp.ipynb
          - text: umapspectral
            href: articles/umapspectral.ipynb
          - text: umato-eval
            href: articles/umato-eval.ipynb

execute:
  enabled: false

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true
    code-tools: true
    page-layout: full
